  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e=\"padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex:0 0 auto;\">\n        <div style=\"display:flex; flex-direction:column; gap:2px;\">\n          <h2 style=\"margin:0; font-size:16px; font-weight:700; font-family:'Space Grotesk',sans-serif;\">Configurações<\u002Fh2>\n          <span style=\"font-size:12px; color:var(--muted);\">Adicione e gerencie seus sistemas<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeDrawer }}\" aria-label=\"Fechar\" style=\"width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:rgba(255,255,255,.7); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:#fff\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"flex:1 1 auto; overflow-y:auto; padding:22px 24px;\">\n        <div style=\"background:rgba(255,255,255,.7); border:1px solid var(--glass-bd); border-radius:18px; padding:18px; margin-bottom:22px; box-shadow:0 8px 24px rgba(28,40,95,.07);\">\n          <div style=\"font-size:13px; font-weight:700; margin-bottom:14px;\">{{ formTitle }}<\u002Fdiv>\n\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:6px;\">Nome<\u002Flabel>\n          <input type=\"text\" value=\"{{ draft.name }}\" onchange=\"{{ onName }}\" placeholder=\"Ex.: Radar Comercial\" style=\"width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--line); background:var(--field); color:var(--text); font-size:13.5px; outline:none; margin-bottom:14px;\" style-focus=\"border-color:#7a3ff0\">\n\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-botto ;\">\n            <button onclick=\"{{ saveForm }}\" style=\"flex:1; padding:11px; border-radius:12px; border:none; background:linear-gradient(120deg,#3b46d4,#7a3ff0); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; box-shadow:0 8px 20px rgba(90,60,220,.28);\">{{ saveLabel }}<\u002Fbutton>\n            <sc-if value=\"{{ isEditing }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ cancelEdit }}\" style=\"padding:11px 16px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.7); color:var(--text); font-weight:600; font-size:13.5px; cursor:pointer;\">Cancelar<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:11.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--faint); margin-bottom:12px;\">Seus sistemas · {{ count }}<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <sc-for list=\"{{ drawerItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:13px; border:1px solid var(--line); background:rgba(255,255,255,.65);\">\n              <span style=\"{{ item.tileStyleSm }}\">{{ item.iconEl }}<\u002Fspan>\n              <span style=\"flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:1px;\">\n                <span style=\"font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ item.name }}<\u002Fspan>\n                <span style=\"font-size:11px; color:var(--faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ item.host }}<\u002Fspan>\n              <\u002Fspan>\n              <button onclick=\"{{ item.onEdit }}\" aria-label=\"Editar\" style=\"width:30px; height:30px; border-radius:9px; border:1px solid var(--line); background:rgba(255,255,255,.8); color:var(--muted); cursor:pointer; d   tiltMove = (e) => {\n    const el = e.currentTarget; const r = el.getBoundingClientRect();\n    const px = (e.clientX - r.left) / r.width - 0.5;\n    const py = (e.clientY - r.top) / r.height - 0.5;\n    el.style.transform = 'perspective(900px) rotateY(' + (px * 11).toFixed(2) + 'deg) rotateX(' + (-py * 11).toFixed(2) + 'deg) translateY(-8px)';\n    el.style.boxShadow = '0 30px 60px rgba(28,40,95,.22)';\n  };\n  tiltLeave = (e) => { const el = e.currentTarget; el.style.transform = ''; el.style.boxShadow = ''; };\n\n  // ---- handlers ----\n  openDrawer = () => this.setState({ drawerOpen: true });\n  closeDrawer = () => this.setState({ drawerOpen: false, editingId: null, draft: this.blankDraft() });\n\n  onName = (e) => { const name = e.target.value; this.setState(s => { const d = Object.assign({}, s.draft, { name }); if (d.autoIcon) d.icon = this.suggestIcon(name); return { draft: d }; }); };\n  onUrl = (e) => this.setState(s => ({ draft: Object.assign({}, s.draft, { url: e.target.value }) }));\n  onDesc = (e) => this.setState(s => ({ draft: Object.assign({}, s.draft, { desc: e.target.value }) }));\n  pickIcon = (k) => this.setState(s => ({ draft: Object.assign({}, s.draft, { icon: k, autoIcon: false }) }));\n  pickColor = (c) => this.setState(s => ({ draft: Object.assign({}, s.draft, { color: c }) }));\n\n  saveForm = () => {\n    const d = this.state.draft;\n    if (!d.name.trim()) { alert('Informe um nome.'); return; }\n    let url = (d.url || '').trim();\n    if (!url) { alert('Informe o link (URL).'); return; }\n    if (!/^https?:\\/\\//i.test(url)) url = 'https://' + url;\n    const icon = d.icon || this.suggestIcon(d.name);\n    const color = d.color || '#5B8DEF';\n    let systems;\n    if (this.state.editingId) {\n      systems = this.state.systems.map(s => s.id === this.state.editingId ? Object.assign({}, s, { name: d.name.trim(), url, desc: (d.desc || '').trim(), icon, color }) : s);\n    } else {\n      systems = this.state.systems.concat([{ id: 's' + D drawerOpen, editingId, draft } = this.state;\n\n    const items = systems.map(s => this.decorate(s));\n    const drawerItems = systems.map(s => { const d = this.decorate(s); d.onEdit = () => this.startEdit(s); d.onDelete = () => this.deleteItem(s); return d; });\n\n    const accent = p.brandAccent || '#6C46E6';\n    const markStyle = \"width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.5px;color:#fff;box-shadow:0 10px 24px \" + this.hexToRgba(accent, 0.4) + \";background:linear-gradient(140deg,\" + accent + \",\" + this.mix(accent, '#ffffff', 0.35) + \");\";\n\n    const icBase = 'width:100%;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s ease;';\n    const iconGrid = this.iconKeys().map(k => ({\n      key: k, el: this.buildIcon(k, 19), onClick: () => this.pickIcon(k),\n      style: k === draft.icon ? icBase + 'background:' + this.hexToRgba(draft.color, 0.16) + ';color:' + draft.color + ';border:1px solid ' + draft.color + ';' : icBase + 'background:rgba(255,255,255,.6);color:var(--muted);border:1px solid var(--line);',\n    }));\n    const colorGrid = this.swatches().map(c => ({\n      color: c, onClick: () => this.pickColor(c),\n      style: 'width:26px;height:26px;border-radius:8px;cursor:pointer;border:none;transition:transform .12s ease;background:' + c + ';' + (c === draft.color ? 'box-shadow:0 0 0 2px #fff,0 0 0 4px ' + c + ';' : ''),\n    }));\n\n    return {\n      canvasRef: this.canvasRef,\n      title: p.title || 'VM System',\n      showDesc: p.showDescriptions !== false,\n      markStyle,\n      items, count: systems.length,\n      tiltMove: this.tiltMove, tiltLeave: this.tiltLeave,\n      openDrawer: this.openDrawer, drawerOpen, closeDrawer: this.closeDrawer,\n      drawerItems,\n      draft, isEditing: !!editingId,\n      formTitle: editingId ? 'Edi
