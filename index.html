  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

22, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin:0; padding:0; height:100%; overflow:hidden; }\n  input, button, textarea { font-family: inherit; }\n  :root {\n    --text:#1a2032; --muted:#5c6578; --faint:#98a0b3;\n    --glass:rgba(255,255,255,.55); --glass-2:rgba(255,255,255,.42); --glass-bd:rgba(255,255,255,.8);\n    --field:rgba(255,255,255,.72); --line:rgba(28,38,80,.1);\n    --shadow:0 18px 50px rgba(28,40,95,.14);\n  }\n  ::-webkit-scrollbar { width:9px; height:9px; }\n  ::-webkit-scrollbar-thumb { background:rgba(28,38,80,.18); border-radius:10px; border:2px solid transparent; background-clip:content-box; }\n  ::-webkit-scrollbar-track { background:transparent; }\n  @keyframes floatUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }\n  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }\n  @keyframes slideIn { from { transform:translateX(30px); opacity:.3; } to { transform:none; opacity:1; } }\n  @keyframes shimmer { 0%{ background-position:0% 50%; } 100%{ background-position:200% 50%; } }\n  @media (max-width: 900px) {\n    html, body { overflow: auto !important; }\n    .vm-page { height: auto !important; min-height: 100vh; }\n    .vm-scroll { overflow: visible !important; }\n    .vm-card { width: calc((100% - 16px) / 2) !important; }\n  }\n  @media (max-width: 560px) {\n    .vm-card { width: 100% !important; }\n  }\n  @media (max-height: 620px) {\n    html, body { overflow: auto !important; }\n    .vm-page { height: auto !important; min-height: 100vh; }\n    .vm-scroll { overflow: visible !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"vm-page\" style=\"position:relative; height:100vh; width:100%; overflow:hidden; font-family:'Manrope',system-ui,sans-serif; color:var(--text); background:radial-gradient(58% 55% at 14% 10%, rgba(124,90,240,.15), transparent 62%), radial-gradient(55% 55% at 88% 92%, rgba(10,180,160,.14), transparent 62%), linear-gradient(125deg,#eef1fb 0%,#f3eefb 46%,#eaf8f5 100%);\">\n\n  <!-- animated abstract background -->\n  <canvas ref=\"{{ canvasRef }}\" style=\"position:absolute; inset:0; width:100%; height:100%; z-index:0; opacity:.92; pointer-events:none;\"><\u002Fcanvas>\n  <div style=\"position:absolute; inset:0; z-index:1; pointer-events:none; background:radial-gradient(ellipse 120% 75% at 50% 42%, transparent 52%, rgba(255,255,255,.62) 100%);\"><\u002Fdiv>\n\n  <!-- content -->\n  <div style=\"position:relative; z-index:2; height:100%; display:flex; flex-direction:column; padding:20px clamp(22px,5vw,60px) 20px;\">\n\n    <!-- header -->\n    <header style=\"display:flex; align-items:center; justify-content:space-between; flex:0 0 auto;\">\n      <div style=\"display:flex; align-items:center; gap:13px;\">\n        <div style=\"{{ markStyle }}\">VM<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; line-height:1.1;\">\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; letter-spacing:-.3px;\">{{ title }}<\u002Fspan>\n          <span style=\"font-size:11.5px; color:var(--muted); font-weight:500;\">Portfólio de sistemas<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ openDrawer }}\" aria-label=\"Configurações\" style=\"width:44px; height:44px; border-radius:13px; border:1px solid var(--glass-bd); background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(28,40,95,.1); transition:transform .18s ease, box-shadow .18s ease;\" style-hover=\"transform:translateY(-2px); box-shadow:0 12px 26px rgba(28,40,95,.16)\">\n        <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx (100% - 48px) / 4); flex:0 0 auto; min-width:0; display:flex; flex-direction:column; gap:11px; padding:18px 18px; border-radius:20px; text-decoration:none; color:inherit; background:var(--glass); backdrop-filter:blur(22px) saturate(150%); -webkit-backdrop-filter:blur(22px) saturate(150%); border:1px solid var(--glass-bd); box-shadow:var(--shadow); transform-style:preserve-3d; will-change:transform; transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease; animation:floatUp .55s ease both;\">\n            <span style=\"{{ item.tileStyle }}\">{{ item.iconEl }}<\u002Fspan>\n            <span style=\"display:flex; flex-direction:column; gap:5px;\">\n              <span style=\"font-size:16px; font-weight:700; letter-spacing:-.3px; line-height:1.2;\">{{ item.name }}<\u002Fspan>\n              <sc-if value=\"{{ showDesc }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:12.5px; color:var(--muted); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;\">{{ item.desc }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fspan>\n            <span style=\"position:absolute; top:18px; right:18px; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.55); border:1px solid var(--glass-bd); color:var(--muted);\">\n              <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7M8 7h9v9\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:0 0 auto; text-align:center; padding-top:10px; font-size:11.5px; color:var(--faint); font-weight:500; letter-spacing:.2px;\">{{ count }} sistemas ativos · VendaMais<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CONFIG DRAWER -->\n  <sc-if value=\"{{ drawerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:40; background:rgba(30,38,70,.28); backdrop-filter:blur(3px); animation:fadeIn .2s ease;\" sc-camel-on-click=\"{{ closeDrawer }}\"><\u002Fdiv>\n    <aside style=\"position:fixed; top:0; right:0; bottom:0; z-index:41; width:min(440px,100vw); background:rgba(248,250,254,.9); backdrop-filter:blur(26px) saturate(150%); -webkit-backdrop-filter:blur(26px) saturate(150%); border-left:1px solid var(--glass-bd); box-shadow:-20px 0 60px rgba(28,40,95,.18); display:flex; flex-direction:column; animation:slideIn .3s cubic-bezier(.2,.8,.2,1);\">\n      <div style=\"padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex:0 0 auto;\">\n        <div style=\"display:flex; flex-direction:column; gap:2px;\">\n          <h2 style=\"margin:0; font-size:16px; font-weight:700; font-family:'Space Grotesk',sans-serif;\">Configurações<\u002Fh2>\n          <span style=\"font-size:12px; color:var(--muted);\">Adicione e gerencie seus sistemas<\u002Fspan>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ closeDrawer }}\" aria-label=\"Fechar\" style=\"width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:rgba(255,255,255,.7); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:#fff\">\n          <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"flex:1 1 auto; overflow-y:auto; padding:22px 24px;\">\n        <div style=\"background:rgba(255,255,255,.7); border:1px solid var(--glass-bd); border-radius:18px; padding:18px; margin-bottom:22px; box-shadow:0 8px 24px rgba(28,40,95,.07);\">\n          <div style=\"font-size:13px; font-weight:700; margin-bottom:14px;\">{{ formTitle }}<\u002Fdiv>\n\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:6px;\">Nome<\u002Flabel>\n          <input type=\"text\" value=\"{{ draft.name }}\" sc-camel-on-change=\"{{ onName }}\" placeholder=\"Ex.: Radar Comercial\" style=\"width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--line); background:var(--field); color:var(--text); font-size:13.5px; outline:none; margin-bottom:14px;\" style-focus=\"border-color:#7a3ff0\">\n\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:6px;\">Link (URL)<\u002Flabel>\n          <input type=\"text\" value=\"{{ draft.url }}\" sc-camel-on-change=\"{{ onUrl }}\" placeholder=\"https://meu-sistema.vercel.app\" style=\"width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--line); background:var(--field); color:var(--text); font-size:13.5px; outline:none; margin-bottom:14px;\" style-focus=\"border-color:#7a3ff0\">\n\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:6px;\">Descrição<\u002Flabel>\n          <input type=\"text\" value=\"{{ draft.desc }}\" sc-camel-on-change=\"{{ onDesc }}\" placeholder=\"Descrição curta\" style=\"width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--line); background:var(--field); color:var(--text); font-size:13.5px; outline:none; margin-bottom:16px;\" style-focus=\"border-color:#7a3ff0\">\n\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:8px;\">Ícone <span style=\"color:var(--faint); font-weight:500;\">(sugerido pelo nome)<\u002Fspan><\u002Flabel>\n          <div style=\"display:grid; grid-template-columns:repeat(8,1fr); gap:7px; margin-bottom:16px;\">\n            <sc-for list=\"{{ iconGrid }}\" as=\"ic\" hint-placeholder-count=\"16\">\n              <button sc-camel-on-click=\"{{ ic.onClick }}\" style=\"{{ ic.style }}\">{{ ic.el }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:8px;\">Cor<\u002Flabel>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;\">\n            <sc-for list=\"{{ colorGrid }}\" as=\"sw\" hint-placeholder-count=\"10\">\n              <button sc-camel-on-click=\"{{ sw.onClick }}\" aria-label=\"cor\" style=\"{{ sw.style }}\" style-hover=\"transform:scale(1.12)\"><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:10px;\">\n            <button sc-camel-on-click=\"{{ saveForm }}\" style=\"flex:1; padding:11px; border-radius:12px; border:none; background:linear-gradient(120deg,#3b46d4,#7a3ff0); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; box-shadow:0 8px 20px rgba(90,60,220,.28);\">{{ saveLabel }}<\u002Fbutton>\n            <sc-if value=\"{{ isEditing }}\" hint-placeholder-val=\"{{ false }}\">\n              <button sc-camel-on-click=\"{{ cancelEdit }}\" style=\"padding:11px 16px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.7); color:var(--text); font-weight:600; font-size:13.5px; cursor:pointer;\">Cancelar<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:11.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--faint); margin-bottom:12px;\">Seus sistemas · {{ count }}<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <sc-for list=\"{{ drawerItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:13px; border:1px solid var(--line); background:rgba(255,255,255,.65);\">\n              <span style=\"{{ item.tileStyleSm }}\">{{ item.iconEl }}<\u002Fspan>\n              <span style=\"flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:1px;\">\n                <span style=\"font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ item.name }}<\u002Fspan>\n                <span style=\"font-size:11px; color:var(--faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ item.host }}<\u002Fspan>\n              <\u002Fspan>\n              <button sc-camel-on-click=\"{{ item.onEdit }}\" aria-label=\"Editar\" style=\"width:30px; height:30px; border-radius:9px; border:1px solid var(--line); background:rgba(255,255,255,.8); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\" style-hover=\"color:var(--text)\">\n                <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2 2 0 0 1 3 3L7 19l-4 1 1-4z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <button sc-camel-on-click=\"{{ item.onDelete }}\" aria-label=\"Excluir\" style=\"width:30px; height:30px; border-radius:9px; border:1px solid var(--line); background:rgba(255,255,255,.8); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\" style-hover=\"color:#e5484d; border-color:#e5484d\">\n                <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:0 24px 22px;\">\n        <div style=\"background:rgba(255,255,255,.7); border:1px solid var(--glass-bd); border-radius:18px; padding:18px; box-shadow:0 8px 24px rgba(28,40,95,.07);\">\n          <div style=\"font-size:13px; font-weight:700; margin-bottom:4px;\">Publicar no GitHub<\u002Fdiv>\n          <p style=\"margin:0 0 14px; font-size:11.5px; color:var(--muted); line-height:1.5;\">Grava a lista no seu repositório — a Vercel republica e todos os dispositivos veem a mesma lista.<\u002Fp>\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:6px;\">Repositório (usuario/repo)<\u002Flabel>\n          <input type=\"text\" value=\"{{ ghRepo }}\" sc-camel-on-change=\"{{ onGhRepo }}\" placeholder=\"ex.: joao/vm-system\" style=\"width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--line); background:var(--field); color:var(--text); font-size:13.5px; outline:none; margin-bottom:12px;\" style-focus=\"border-color:#7a3ff0\">\n          <label style=\"display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:6px;\">Token do GitHub<\u002Flabel>\n          <input type=\"password\" value=\"{{ ghToken }}\" sc-camel-on-change=\"{{ onGhToken }}\" placeholder=\"github_pat_…\" style=\"width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--line); background:var(--field); color:var(--text); font-size:13.5px; outline:none; margin-bottom:14px;\" style-focus=\"border-color:#7a3ff0\">\n          <button sc-camel-on-click=\"{{ publish }}\" style=\"width:100%; padding:11px; border-radius:12px; border:none; background:linear-gradient(120deg,#0aa06f,#0ea5a0); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; box-shadow:0 8px 20px rgba(14,160,120,.28);\">{{ pubLabel }}<\u002Fbutton>\n          <sc-if value=\"{{ hasPubStatus }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:10px; font-size:12px; font-weight:600; color:var(--muted); line-height:1.45;\">{{ pubStatus }}<\u00 l.style.transform = 'perspective(900px) rotateY(' + (px * 11).toFixed(2) + 'deg) rotateX(' + (-py * 11).toFixed(2) + 'deg) translateY(-8px)';\n    el.style.boxShadow = '0 30px 60px rgba(28,40,95,.22)';\n  };\n  tiltLeave = (e) => { const el = e.currentTarget; el.style.transform = ''; el.style.boxShadow = ''; };\n\n  // ---- handlers ----\n  openDrawer = () => this.setState({ drawerOpen: true });\n  closeDrawer = () => this.setState({ drawerOpen: false, editingId: null, draft: this.blankDraft() });\n\n  onName = (e) => { const name = e.target.value; this.setState(s => { const d = Object.assign({}, s.draft, { name }); if (d.autoIcon) d.icon = this.suggestIcon(name); return { draft: d }; }); };\n  onUrl = (e) => this.setState(s => ({ draft: Object.assign({}, s.draft, { url: e.target.value }) }));\n  onDesc = (e) => this.setState(s => ({ draft: Object.assign({}, s.draft, { desc: e.target.value }) }));\n  pickIcon = (k) => this.setState(s => ({ draft: Object.assign({}, s.draft, { icon: k, autoIcon: false }) }));\n  pickColor = (c) => this.setState(s => ({ draft: Object.assign({}, s.draft, { color: c }) }));\n\n  saveForm = () => {\n    const d = this.state.draft;\n    if (!d.name.trim()) { alert('Informe um nome.'); return; }\n    let url = (d.url || '').trim();\n    if (!url) { alert('Informe o link (URL).'); return; }\n    if (!/^https?:\\/\\//i.test(url)) url = 'https://' + url;\n    const icon = d.icon || this.suggestIcon(d.name);\n    const color = d.color || '#5B8DEF';\n    let systems;\n    if (this.state.editingId) {\n      systems = this.state.systems.map(s => s.id === this.state.editingId ? Object.assign({}, s, { name: d.name.trim(), url, desc: (d.desc || '').trim(), icon, color }) : s);\n    } else {\n      systems = this.state.systems.concat([{ id: 's' + Date.now(), name: d.name.trim(), url, desc: (d.desc || '').trim(), icon, color }]);\n    }\n    this.persist(systems);\n    this.setState({ editingId: null, draft: this.blankDraft() });\n  };\n\n  startEdit =  null, 2);\n      const content = btoa(unescape(encodeURIComponent(body)));\n      const put = await fetch(api, { method: 'PUT', headers, body: JSON.stringify({ message: 'Atualiza sistemas via VM System', content, sha }) });\n      if (!put.ok) { const err = await put.json().catch(() => ({})); throw new Error(err.message || 'Falha ao gravar (' + put.status + ').'); }\n      this.setState({ pubBusy: false, pubStatus: '✓ Publicado! A Vercel atualiza em ~30s em todos os dispositivos.' });\n    } catch (e) {\n      this.setState({ pubBusy: false, pubStatus: '✗ ' + (e.message || 'Falha ao publicar.') });\n    }\n  };\n\n  exportData = () => {\n    const blob = new Blob([JSON.stringify(this.state.systems, null, 2)], { type: 'application/json' });\n    const url = URL.createObjectURL(blob); const a = document.createElement('a');\n    a.href = url; a.download = 'vm-system.json'; document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  };\n  importData = (e) => {\n    const file = e.target.files && e.target.files[0]; if (!file) return;\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      try {\n        const arr = JSON.parse(ev.target.result); if (!Array.isArray(arr)) throw new Error('fmt');\n        const clean = arr.filter(x => x && x.name && x.url).map((x, i) => ({ id: x.id || 's' + Date.now() + i, name: String(x.name), url: String(x.url), desc: String(x.desc || ''), icon: String(x.icon || this.suggestIcon(x.name)), color: x.color || '#5B8DEF' }));\n        this.persist(clean); alert(clean.length + ' sistema(s) importado(s).');\n      } catch (err) { alert('Arquivo inválido. Use um .json exportado aqui.'); }\n    };\n    reader.readAsText(file); e.target.value = '';\n  };\n\n  renderVals() {\n    const p = this.props || {};\n    const { systems, drawerOpen, editingId, draft } = this.state;\n\n    const items = systems.map(s => this.decorate(s));\n    const drawerItems = systems.map(s => { const d = this.decorate(s); d.onEdit = () => this.startEdit(s); d.onDelete = () => this.deleteItem(s); return d; });\n\n    const accent = p.brandAccent || '#6C46E6';\n    const markStyle = \"width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.5px;color:#fff;box-shadow:0 10px 24px \" + this.hexToRgba(accent, 0.4) + \";background:linear-gradient(140deg,\" + accent + \",\" + this.mix(accent, '#ffffff', 0.35) + \");\";\n\n    const icBase = 'width:100%;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s ease;';\n    const iconGrid = this.iconKeys().map(k => ({\n      key: k, el: this.buildIcon(k, 19), onClick: () => this.pickIcon(k),\n      style: k === draft.icon ? icBase + 'background:' + this.hexToRgba(draft.color, 0.16) + ';color:' + draft.color + ';border:1px solid ' + draft.color + ';' : icBase + 'background:rgba(255,255,255,.6);color:var(--muted);border:1px solid var(--line);',\n    }));\n    const colorGrid = this.swatches().map(c => ({\n      color: c, onClick: () => this.pickColor(c),\n      style: 'width:26px;height:26px;border-radius:8px;cursor:pointer;border:none;transition:transform .12s ease;background:' + c + ';' + (c === draft.color ? 'box-shadow:0 0 0 2px #fff,0 0 0 4px ' + c + ';' : ''),\n    }));\n\n    return {\n      canvasRef: this.canvasRef,\n      title: p.title || 'VM System',\n      showDesc: p.showDescriptions !== false,\n      markStyle,\n      items, count: systems.length,\n      tiltMove: this.tiltMove, tiltLeave: this.tiltLeave,\n      openDrawer: this.openDrawer, drawerOpen, closeDrawer: this.closeDrawer,\n      drawerItems,\n      draft, isEditing: !!editingId,\n      formTitle: editingId ? 'Editar sistema' : 'Adicionar sistema',\n      saveLabel: editingId ? 'Salvar alterações' : 'Adicionar sistema',\n      onName: this.onName, onUrl: this.onUrl, onDesc: this.onDesc,\n      iconGrid, colorGrid,\n      saveForm: this.saveForm, cancelEdit: this.cancelEdit,\n      exportData: this.exportData, importData: this.importData,\n      ghRepo: this.state.ghRepo, ghToken: this.state.ghToken,\n      onGhRepo: this.onGhRepo, onGhToken: this.onGhToken,\n      publish: this.publish, pubStatus: this.state.pubStatus,\n      pubLabel: this.state.pubBusy ? 'Publicando…' : 'Publicar em todos os dispositivos',\n      hasPubStatus: !!this.state.pubStatus,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
